server {
    # Ensure Nginx serves files from the public directory
    root /var/app/current/public;
    index index.php index.html index.htm;

    # Enable rewrite functionality
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Redirect Trailing Slashes If Not A Folder...
    location / {
        rewrite ^/(.*)/$ /$1 permanent;
    }

    # Handle Authorization Header
    # This block is not needed again in location /; combining into one block above.
    # Authorization header is handled in try_files logic and passed to PHP-FPM if needed.

    # Ensure that PHP files are passed to the PHP handler
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;  # Elastic Beanstalk uses this for PHP-FPM
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    }

    # Handle static files like CSS, JS, images, etc.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires max;
        access_log off;
    }

    # Deny access to hidden files like .env
    location ~ /\.ht {
        deny all;
    }
}
