# Ensure Nginx serves files from the public directory
location / {
    # Try to serve the requested file or directory, if it doesn't exist, pass the request to index.php
    try_files $uri $uri/ /index.php?$query_string;
}

# Handle Authorization Header (to ensure Authorization is passed to Laravel)
location / {
    if ($http_authorization) {
        set $auth_header $http_authorization;
    }
    try_files $uri $uri/ /index.php?$query_string;
}

# Redirect Trailing Slashes If Not A Folder...
if (!-d $request_filename) {
    rewrite ^/(.+)/$ /$1 permanent;
}

# PHP Handler
location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/var/run/php-fpm/www.sock;  # Use this line for PHP-FPM on Elastic Beanstalk
}

# Cache static files for improved performance
location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp)$ {
    expires max;
    access_log off;
}
