server {
    # Ensure Nginx serves files from the public directory
    root /var/app/current/public;

    # Enable rewrite functionality
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle Authorization Header
    location / {
        if ($http_authorization) {
            set $auth_header $http_authorization;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Redirect Trailing Slashes If Not A Folder...
    if (!-d $request_filename) {
        rewrite ^/(.+)/$ /$1 permanent;
    }

    # Ensure that PHP files are passed to the PHP handler
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;  # This might vary based on your Elastic Beanstalk PHP setup
    }

    # Handle static files like CSS, JS, images, etc.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires max;
        access_log off;
    }
}